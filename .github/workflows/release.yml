# TuneCraft Release
#
# Triggered by pushing a version tag (e.g. v3.2.0).
# Builds release binaries for Linux, macOS, and Windows, then
# attaches them to a GitHub Release so they can be downloaded directly
# from the repository's Releases page — no local Rust toolchain required.
#
# How to publish a release:
#   cargo set-version --bump patch   # or minor / major
#   NEW_VERSION=$(grep '^version = ' Cargo.toml | head -n1 | cut -d'"' -f2)
#   git commit -am "chore(release): bump version to $NEW_VERSION"
#   git tag "v$NEW_VERSION"
#   git push origin main --tags

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tunecraft
            asset_name: tunecraft-linux-x86_64
          - os: macos-latest
            artifact_name: tunecraft
            asset_name: tunecraft-macos-aarch64
          - os: windows-latest
            artifact_name: tunecraft.exe
            asset_name: tunecraft-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            pkg-config

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p tunecraft

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Upload binary for release job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create/edit releases

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: TuneCraft ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/tunecraft-linux-x86_64/tunecraft-linux-x86_64
            dist/tunecraft-macos-aarch64/tunecraft-macos-aarch64
            dist/tunecraft-windows-x86_64.exe/tunecraft-windows-x86_64.exe
          body: |
            ## TuneCraft ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | 🐧 Linux (x86_64) | `tunecraft-linux-x86_64` |
            | 🍎 macOS (Apple Silicon) | `tunecraft-macos-aarch64` |
            | 🪟 Windows (x86_64) | `tunecraft-windows-x86_64.exe` |

            **Linux**: After downloading, run `chmod +x tunecraft-linux-x86_64 && ./tunecraft-linux-x86_64`
            **macOS**: After downloading, run `chmod +x tunecraft-macos-aarch64 && ./tunecraft-macos-aarch64`
            **Windows**: Double-click `tunecraft-windows-x86_64.exe` to run.
