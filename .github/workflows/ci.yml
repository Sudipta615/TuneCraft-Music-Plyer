name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            apt: libasound2-dev libgtk-3-dev libssl-dev pkg-config
            artifact_name: tunecraft-linux
            binary_path: target/release/tunecraft
          - os: macos-latest
            artifact_name: tunecraft-macos
            binary_path: target/release/tunecraft
          - os: windows-latest
            artifact_name: tunecraft-windows
            binary_path: target/release/tunecraft.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        if: matrix.os != 'windows-latest'
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Clippy (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo clippy --workspace -- -D warnings

      - name: Test (no default features)
        run: cargo test --workspace --no-default-features

      - name: Test (default features)
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release --workspace

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          retention-days: 7
