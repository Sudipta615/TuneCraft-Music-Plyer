name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Linux: GStreamer + audio libs ──────────────────────────────────────
      - name: Install GStreamer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            libsqlite3-dev \
            libsecret-1-dev \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev

      # ── macOS: GStreamer via Homebrew ──────────────────────────────────────
      - name: Install GStreamer (macOS)
        if: runner.os == 'macOS'
        run: brew install gstreamer gst-plugins-base gst-plugins-good

      # ── Windows: GStreamer MSVC runtime ───────────────────────────────────
      - name: Install GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://gstreamer.freedesktop.org/data/pkg/windows/1.24.0/msvc/gstreamer-1.0-msvc-x86_64-1.24.0.msi"
          Invoke-WebRequest $url -OutFile gstreamer.msi
          Start-Process msiexec.exe -Wait -ArgumentList '/i gstreamer.msi /quiet'
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=C:\gstreamer\1.0\msvc_x86_64" >> $env:GITHUB_ENV
          echo "C:\gstreamer\1.0\msvc_x86_64\bin" >> $env:GITHUB_PATH

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Security audit
        run: |
          cargo install cargo-audit
          cargo audit

  # ── MSRV Check ──────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.75.0)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75.0
        uses: dtolnay/rust-toolchain@1.75.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: msrv-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: msrv-cargo-

      - name: Install GStreamer (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libsqlite3-dev \
            libsecret-1-dev \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev

      - name: Check MSRV compatibility
        run: cargo check --workspace
