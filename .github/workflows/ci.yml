# TuneCraft CI
#
# Runs on every push and pull request. Ensures the project compiles on all
# three target platforms, that the test suite (including smoke_tests.rs,
# which was broken between v2.6 and v3.0.0) actually builds and passes,
# and that clippy stays clean.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install ALSA and Fontconfig headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libfontconfig1-dev libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA and Fontconfig headers (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libfontconfig1-dev libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        # Tests that require an audio device (e.g. test_app_context_init_headless)
        # gracefully skip when no device is available, so we don't need to
        # guard the test run with a feature flag.
        run: cargo test --workspace --all-targets --no-fail-fast

  build-release:
    name: Build release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA and Fontconfig headers (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libfontconfig1-dev libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --workspace

  cargo-deny:
    name: Cargo deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2

  # v3.1.0: Benchmark regression detection. Runs the criterion benches
  # and compares against the `main` branch baseline. A 10 % regression
  # fails the job — this catches DSP performance regressions before they
  # ship (we already had one in v2.8.x where the limiter "instant peak
  # catch" added a 15 % overhead).
  bench:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We need full history to compare against main.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA and Fontconfig headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libfontconfig1-dev libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Install critcmp
        run: cargo install critcmp || true
      - name: Run benchmarks
        run: |
          cargo bench --workspace --no-run  # compile first to separate compile errors from bench failures
          cargo bench --workspace -- --save-baseline current
      - name: Compare against main baseline (on PRs only)
        if: github.event_name == 'pull_request'
        run: |
          # Check out main, run benches, compare. This is approximate
          # because GH runners don't have stable perf — but a 10 %
          # regression will still show up.
          git checkout main
          cargo bench --workspace -- --save-baseline main
          git checkout -
          critcmp main current || true

  # v3.1.0: Audio-device smoke test. Sets up a fake ALSA loopback device
  # on Linux so the audio-callback tests can actually run end-to-end.
  # Without this, `test_app_context_init_headless` just verifies that
  # the engine gracefully handles "no device" — which is a much weaker
  # test than "engine successfully opens a device and processes audio".
  audio-device-test:
    name: Audio device smoke test (Linux ALSA loopback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA + Fontconfig + loopback module
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfontconfig1-dev libdbus-1-dev pkg-config alsa-utils
          # Try to load the loopback module. This requires
          # `--privileged` on the runner; if it fails, the test falls
          # back to the null device.
          sudo modprobe snd-aloop 2>/dev/null || echo "snd-aloop not available, will use default device"
          aplay -l || true
      - uses: Swatinem/rust-cache@v2
      - name: Run audio-output-specific tests
        env:
          # Use the ALSA default device (which is the loopback if it loaded).
          ALLOUDIO_BACKEND: alsa
        run: cargo test --workspace --features audio-output --no-fail-fast -- --test-threads=1
