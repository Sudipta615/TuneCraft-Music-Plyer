name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Linux: GStreamer + audio libs ──────────────────────────────────────
      - name: Install GStreamer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            libsqlite3-dev \
            libsecret-1-dev \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      # ── macOS: GStreamer via Homebrew ──────────────────────────────────────
      - name: Install GStreamer (macOS)
        if: runner.os == 'macOS'
        run: brew install gstreamer gst-plugins-base gst-plugins-good

      # ── Windows: GStreamer via Chocolatey ─────────────────────────────────
      # freedesktop.org blocks CI runner IPs with bot-protection; choco
      # pulls from a CDN mirror that is not rate-limited.
      # IMPORTANT: PKG_CONFIG_PATH must use forward slashes. pkgconfiglite
      # treats `:` as a path-list separator on all platforms; the colon in
      # `C:\...` would be misread as a separator, splitting the path into
      # `C` and `\gstreamer\...`, leaving glib-2.0.pc unfindable.
      - name: Install GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install gstreamer gstreamer-devel pkgconfiglite --no-progress -y
          $gstRoot = "C:/gstreamer/1.0/msvc_x86_64"
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" >> $env:GITHUB_ENV
          echo "C:/gstreamer/1.0/msvc_x86_64/bin" >> $env:GITHUB_PATH
          echo "PKG_CONFIG_PATH=$gstRoot/lib/pkgconfig" >> $env:GITHUB_ENV

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Security audit
        run: |
          cargo install cargo-audit
          cargo audit

  # ── MSRV Check ──────────────────────────────────────────────────────────────
  # Floor is 1.89.0, driven by transitive deps:
  #   time-core 0.1.8 / time-macros 0.2.27 → rustc 1.88+
  #   zbus 5.15.0 / zvariant 5.x           → rustc 1.87
  #   icu_collections 2.0                  → rustc 1.88
  # The union of all floors gives 1.89 as the effective MSRV.
  msrv:
    name: MSRV (1.89.0)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89.0
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: msrv-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: msrv-cargo-

      - name: Install GStreamer (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libsqlite3-dev \
            libsecret-1-dev \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - name: Check MSRV compatibility
        run: cargo check --workspace
